<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef2f7;
display:flex;
height:100vh;
}

/* ===== SIDEBAR ===== */

.sidebar{
width:260px;
background:linear-gradient(135deg,#0a1f44,#1e3c72);
color:white;
padding:25px 20px;
display:flex;
flex-direction:column;
box-shadow:4px 0 20px rgba(0,0,0,0.15);
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
letter-spacing:1px;
}

.upload-btn{
background:#1e90ff;
padding:12px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;
margin-bottom:15px;
transition:0.3s;
}

.upload-btn:hover{
background:#3aa0ff;
transform:scale(1.05);
}

.menu button{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
background:#132d63;
color:white;
font-size:14px;
cursor:pointer;
transition:0.3s;
text-align:left;
padding-left:18px;
}

.menu button:hover{
background:#1e90ff;
transform:translateX(5px);
}

/* ===== MAIN ===== */

.main{
flex:1;
padding:40px;
overflow-y:auto;
}

.title{
font-size:28px;
color:#0a1f44;
margin-bottom:30px;
font-weight:600;
}

/* ===== OFFER CARDS ===== */

.grid{
display:flex;
gap:25px;
flex-wrap:wrap;
margin-bottom:40px;
}

.card{
flex:1;
min-width:240px;
max-width:260px;
background:white;
padding:35px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
cursor:pointer;
animation:fadeIn 0.7s ease;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 18px 35px rgba(0,0,0,0.15);
}

.card h3{
font-size:16px;
color:#666;
margin-bottom:10px;
}

.card p{
font-size:30px;
font-weight:bold;
color:#0a1f44;
}

/* ===== COLORS ===== */

.total{border-top:6px solid #1e90ff;}
.accepted{border-top:6px solid #28a745;}
.declined{border-top:6px solid #dc3545;}
.pending{border-top:6px solid #ffc107;}
.cancelled{border-top:6px solid #6c757d;}

/* ===== VERIFICATION SECTION ===== */

.section{
margin-top:10px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.section-header h2{
font-size:22px;
color:#0a1f44;
}

.section-header span{
font-size:13px;
color:#888;
}

.card-row{
display:flex;
gap:25px;
flex-wrap:wrap;
}

/* ===== ANIMATION ===== */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->

<div class="sidebar">

<h2>Offer System</h2>

<button class="upload-btn" onclick="location.href='/upload'">
Upload Excel
</button>

<button class="upload-btn" onclick="location.href='/download_template'">
Download Template
</button>

<div class="menu">

<button onclick="location.href='/offers/total'">Total Offers</button>
<button onclick="location.href='/offers/accepted'">Accepted</button>
<button onclick="location.href='/offers/declined'">Declined</button>
<button onclick="location.href='/offers/action_pending'">Action Pending</button>
<button onclick="location.href='/offers/cancelled'">Cancelled</button>

</div>

</div>

<!-- ===== MAIN CONTENT ===== -->

<div class="main">

<div class="title">Dashboard Overview</div>

<!-- ===== OFFER CARDS ===== -->

<div class="grid">

<div class="card total" onclick="location.href='/offers/total'">
<h3>Total Offers</h3>
<p>{{total}}</p>
</div>

<div class="card accepted" onclick="location.href='/offers/accepted'">
<h3>Accepted</h3>
<p>{{accepted}}</p>
</div>

<div class="card declined" onclick="location.href='/offers/declined'">
<h3>Declined</h3>
<p>{{declined}}</p>
</div>

<div class="card pending" onclick="location.href='/offers/action_pending'">
<h3>Action Pending</h3>
<p>{{pending}}</p>
</div>

<div class="card cancelled" onclick="location.href='/offers/cancelled'">
<h3>Cancelled</h3>
<p>{{cancelled}}</p>
</div>

</div>

<!-- ===== VERIFICATION SECTION ===== -->

<div class="section">

<div class="section-header">
    <h2>Verification Overview</h2>
</div>

<div class="card-row">

<div class="card accepted" onclick="location.href='/verification/verified'">
    <h3>Verified</h3>
    <p>{{ verified }}</p>
</div>

<div class="card pending" onclick="location.href='/verification/pending'">
    <h3>Pending</h3>
    <p>{{ verification_pending }}</p>
</div>

<div class="card declined" onclick="location.href='/verification/rejected'">
    <h3>Rejected</h3>
    <p>{{ rejected }}</p>
</div>

</div>

</div>

</div>

</body>
</html>
