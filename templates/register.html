<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
}

/* MAIN CONTAINER */

.container{
display:flex;
height:100vh;
width:100%;
}

/* LEFT CURVED PANEL */

.left{
flex:1.3;
background:linear-gradient(135deg,#0a1f44,#1e3c72);
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

border-top-right-radius:300px;
border-bottom-right-radius:300px;

animation:slideLeft 1s ease;
}

.left h1{
font-size:42px;
line-height:1.4;
padding:40px;
}

/* RIGHT SIDE */

.right{
flex:1;
background:#f5f7fa;
display:flex;
align-items:center;
justify-content:center;
animation:fadeIn 1s ease;
}

/* REGISTER CARD */

.register-card{
width:420px;
padding:45px;
background:white;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.register-card h2{
margin-bottom:25px;
color:#2c5364;
}

/* INPUTS */

.input-group{
margin-bottom:18px;
}

input{
width:100%;
padding:14px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
transition:0.3s;
}

input:focus{
outline:none;
border-color:#2c5364;
box-shadow:0 0 6px rgba(44,83,100,0.4);
}

/* BUTTON */

button{
width:100%;
padding:14px;
background:linear-gradient(135deg,#0a1f44,#1e3c72);
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1c364b;
transform:translateY(-2px);
}

/* LOGIN LINK */

.login-link{
text-align:center;
margin-top:20px;
font-size:14px;
}

.login-link a{
color:#2c5364;
font-weight:600;
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

/* ANIMATIONS */

@keyframes slideLeft{
from{
transform:translateX(-80px);
opacity:0;
}
to{
transform:translateX(0);
opacity:1;
}
}

@keyframes fadeIn{
from{
opacity:0;
}
to{
opacity:1;
}
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT WELCOME -->

<div class="left">

<h1>
Create Your <br>
Offer Letter <br>
Portal Account
</h1>

</div>

<!-- REGISTER FORM -->

<div class="right">

<div class="register-card">

<h2>Create Account</h2>

<form method="POST">

<div class="input-group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="email" name="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<div class="input-group">
<input type="password" name="confirm_password" placeholder="Confirm Password" required>
</div>

<button type="submit">Register</button>

</form>

<div class="login-link">
Already have an account?  
<a href="/">Login</a>
</div>

</div>

</div>

</div>

</body>
</html>
