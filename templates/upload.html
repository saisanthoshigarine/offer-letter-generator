<form method="POST" enctype="multipart/form-data">

    <label>Company Name:</label><br>
    <input type="text" name="company" required><br><br>

    <label>Upload Letterhead (PDF):</label><br>
    <input type="file" name="letterhead" accept=".pdf" required><br><br>

    <label>Upload Candidate Excel:</label><br>
    <input type="file" name="file" accept=".xlsx" required><br><br>

    <button type="submit">Upload & Continue</button>

</form>
