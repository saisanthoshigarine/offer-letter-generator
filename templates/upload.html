<!DOCTYPE html>
<html>
<head>
<title>Upload Excel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* same background as login */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0a1f44,#1e3c72);
overflow:hidden;
}

/* floating animation */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:rgba(255,255,255,0.05);
border-radius:50%;
top:-120px;
left:-120px;
animation:move1 10s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,0.05);
border-radius:50%;
bottom:-150px;
right:-120px;
animation:move2 12s infinite alternate;
}

@keyframes move1{
from{transform:translateY(0)}
to{transform:translateY(40px)}
}

@keyframes move2{
from{transform:translateY(0)}
to{transform:translateY(-40px)}
}

/* main container */

.container{
width:900px;
height:500px;
background:white;
border-radius:20px;
display:flex;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
animation:fade 1s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* left illustration */

.left{
flex:1;
background:linear-gradient(135deg,#0a1f44,#1e3c72);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

.left h1{
font-size:36px;
margin-bottom:20px;
}

.left p{
opacity:0.8;
text-align:center;
}

/* right upload section */

.right{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
padding:60px;
}

.right h2{
margin-bottom:20px;
color:#243B55;
}

/* upload input */

input[type=file]{
padding:14px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:25px;
}

/* button */

button{
padding:14px;
border:none;
background:linear-gradient(135deg,#0a1f44,#1e3c72);
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<div class="left">
<h1>Upload Excel</h1>
<p>Upload candidate data to generate offer letters automatically</p>
</div>

<div class="right">

<h2>Select Excel File</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="file" required>

<button type="submit">Upload File</button>

</form>

</div>

</div>

</body>
</html>
