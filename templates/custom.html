<!DOCTYPE html>
<html>
<head>
    <title>Custom Pattern</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            background:linear-gradient(135deg,#0a1f44,#1e3c72);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 700px;
            max-width: 90%;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 10px;
            font-weight: 600;
            color: #2c3e50;
        }

        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #e0e6ed;
            font-size: 15px;
            outline: none;
            resize: none;
            transition: all 0.2s ease;
            background: #fafbfc;
        }

        textarea:focus {
            border-color: #4a90e2;
            background: #ffffff;
        }

        .variables {
            margin-top: 12px;
            font-size: 13px;
            color: #95a5a6;
        }

        .btn {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #357abd;
        }

        @media (max-width: 600px) {
            .card {
                padding: 25px;
            }

            textarea {
                height: 220px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Create Custom Pattern</h2>
        <div class="subtitle">
            Design your own offer letter template using dynamic fields.
        </div>

        <form method="POST">
            <textarea name="custom_text" placeholder="Dear {Name},

We are pleased to offer you the position of {Role}. 
Your joining date will be {Joining_date}.

Best Regards,
HR Team"></textarea>

            <div class="variables">
                Available variables: {Name}, {Role}, {Joining_date}
            </div>

            <button class="btn" type="submit">
                Save & Continue
            </button>
        </form>
    </div>

</body>
</html>
