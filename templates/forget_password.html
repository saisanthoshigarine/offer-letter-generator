<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.box{
width:400px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
}

h2{
margin-bottom:20px;
color:#2c5364;
}

input{
width:100%;
padding:14px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#2c5364;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1c364b;
}

.back{
margin-top:15px;
}

.back a{
text-decoration:none;
color:#2c5364;
font-weight:600;
}

</style>

</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<form method="POST">

<input type="email" name="email" placeholder="Enter your email" required>

<button type="submit">Reset Password</button>

</form>

<div class="back">
<a href="/">Back to Login</a>
</div>

</div>

</body>
</html>
