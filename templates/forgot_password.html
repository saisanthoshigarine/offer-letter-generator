<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* BODY */

body{
min-height:100vh;
background:#ffffff;
}

/* MAIN CONTAINER */

.container{
display:flex;
min-height:100vh;
width:100%;
}

/* LEFT SIDE */

.left{
flex:1.3;
background:linear-gradient(135deg,#0a1f44,#1e3c72);
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
border-top-right-radius:300px;
border-bottom-right-radius:300px;
}

.left h1{
font-size:46px;
line-height:1.4;
padding:40px;
}

/* RIGHT SIDE */

.right{
flex:1;
background:#f5f7fa;
display:flex;
align-items:center;
justify-content:center;
}

/* RESET CARD */

.reset-card{
width:420px;
padding:45px;
background:white;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
animation:cardFade 0.8s ease;
}

@keyframes cardFade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.reset-card h2{
margin-bottom:15px;
color:#2c5364;
}

.reset-card p{
color:#666;
font-size:14px;
margin-bottom:25px;
}

/* INPUT */

.input-group{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

input:focus{
outline:none;
border-color:#2c5364;
}

/* BUTTON */

.reset-btn{
width:100%;
padding:14px;
background:linear-gradient(135deg,#0a1f44,#1e3c72);
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.reset-btn:hover{
background:#1c364b;
}

/* BACK LINK */

.back-login{
margin-top:20px;
text-align:center;
font-size:14px;
}

.back-login a{
color:#2c5364;
text-decoration:none;
font-weight:600;
}

.back-login a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->

<div class="left">

<h1>
Reset Your <br>
Account <br>
Password
</h1>

</div>

<!-- RIGHT -->

<div class="right">

<div class="reset-card">

<h2>Forgot Password</h2>

<p>Enter your registered email to receive a password reset link.</p>

<form method="POST">

<div class="input-group">
<input type="email" name="email" placeholder="Enter your email address" required>
</div>

<button class="reset-btn" type="submit">
Send Reset Link
</button>

</form>

<div class="back-login">
<a href="/">Back to Login</a>
</div>

</div>

</div>

</div>

</body>
</html>
