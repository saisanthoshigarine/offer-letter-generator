<!DOCTYPE html>
<html>
<head>
<title>Offer List</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0a1f44,#1e3c72);
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
animation:fadeIn 0.6s ease;
}

h2{
margin-bottom:20px;
color:#0a1f44;
text-transform:capitalize;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0a1f44;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f5f8ff;
}

/* Status badges */

.badge{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:600;
}

.accepted{
background:#d4edda;
color:#28a745;
}

.declined{
background:#f8d7da;
color:#dc3545;
}

.pending{
background:#fff3cd;
color:#856404;
}

.cancelled{
background:#e2e3e5;
color:#6c757d;
}

/* Back button */

.back{
margin-top:20px;
}

.back button{
padding:10px 18px;
border:none;
background:#0a1f44;
color:white;
border-radius:6px;
cursor:pointer;
}

.back button:hover{
background:#1e90ff;
}

/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<h2>{{status}} Offer Letters</h2>

<table>

<tr>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Joining Date</th>
<th>Status</th>
</tr>

{% for offer in offers %}

<tr>

<td>{{offer.name}}</td>
<td>{{offer.email}}</td>
<td>{{offer.role}}</td>
<td>{{offer.joining_date}}</td>

<td>
<span class="badge {{status}}">
{{status}}
</span>
</td>

</tr>

{% endfor %}

</table>

<div class="back">
<button onclick="location.href='/dashboard'">
⬅ Back to Dashboard
</button>
</div>

</div>

</body>
</html>
