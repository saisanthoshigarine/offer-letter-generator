<!DOCTYPE html>
<html>
<head>
    <title>Select Company</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            background:#f4f7fc;
        }

        /* LEFT PANEL */

        .left-panel{
            flex:0 0 30%;
            background:linear-gradient(135deg,#0a1f44,#1e3c72);
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            padding:60px;
        }

        .left-panel h1{
            font-size:32px;
            margin-bottom:20px;
            font-weight:600;
        }

        .left-panel p{
            font-size:15px;
            line-height:1.7;
            opacity:0.85;
        }

        /* RIGHT PANEL */

        .right-panel{
            flex:0 0 70%;
            padding:70px 90px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .right-panel h2{
            font-size:28px;
            margin-bottom:40px;
            color:#0a1f44;
        }

        .company-grid{
            display:grid;
            grid-template-columns:repeat(2, 1fr);
            gap:35px;
        }

        .company-card{
            background:white;
            border-radius:18px;
            padding:30px;
            display:flex;
            align-items:center;
            gap:25px;
            border:1px solid #e6eaf2;
            box-shadow:0 8px 25px rgba(0,0,0,0.05);
            transition:all 0.3s ease;
            cursor:pointer;
            text-decoration:none;
        }

        .company-card:hover{
            transform:translateY(-6px);
            box-shadow:0 18px 40px rgba(0,0,0,0.12);
            border-color:#1e90ff;
        }

        .company-card img{
            width:75px;
            height:75px;
            object-fit:contain;
        }

        .company-content h3{
            color:#0a1f44;
            font-size:18px;
            margin-bottom:8px;
            font-weight:600;
        }

        .company-content p{
            font-size:14px;
            color:#555;
            line-height:1.6;
        }

        @media(max-width:1000px){
            body{
                flex-direction:column;
            }
            .left-panel{
                height:35vh;
            }
            .right-panel{
                padding:40px;
            }
            .company-grid{
                grid-template-columns:1fr;
            }
        }

    </style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left-panel">
    <h1>Offer Letter Generator</h1>
    <p>
        Create, manage and track professional employment offers.
        Select your organization to continue and customize
        your templates with precision and corporate elegance.
    </p>
</div>

<!-- RIGHT SIDE -->
<div class="right-panel">
    <h2>Select Company</h2>

    <div class="company-grid">

<!-- ArahInfotech -->
<form method="POST" action="/company">
<input type="hidden" name="company" value="arahinfotech">

<button type="submit" class="company-card">

<img src="{{ url_for('static', filename='logos/arah.png') }}">

<div class="company-content">
<h3>ArahInfotech</h3>
<p>AI based HR automation helping businesses manage payroll and digital workflows.</p>
</div>

</button>
</form>


<!-- Vagarious -->
<form method="POST" action="/company">
<input type="hidden" name="company" value="vagarious">

<button type="submit" class="company-card">

<img src="{{ url_for('static', filename='logos/vagarious.png') }}">

<div class="company-content">
<h3>Vagarious</h3>
<p>Creative digital agency delivering branding and marketing solutions globally.</p>
</div>

</button>
</form>


<!-- Uplife -->
<form method="POST" action="/company">
<input type="hidden" name="company" value="uplife">

<button type="submit" class="company-card">

<img src="{{ url_for('static', filename='logos/uplife.png') }}">

<div class="company-content">
<h3>Uplife</h3>
<p>Health and wellness platform helping users improve lifestyle and personal growth.</p>
</div>

</button>
</form>


<!-- Zero7 -->
<form method="POST" action="/company">
<input type="hidden" name="company" value="zero7">

<button type="submit" class="company-card">

<img src="{{ url_for('static', filename='logos/zero7.png') }}">

<div class="company-content">
<h3>Zero7</h3>
<p>Technology consulting company building scalable enterprise software solutions.</p>
</div>
</div>

</body>
</html>
