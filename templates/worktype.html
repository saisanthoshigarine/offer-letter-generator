<!DOCTYPE html>
<html>
<head>
    <title>Select Work Type</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            background:#f4f7fc;
        }

        .left-panel{
            flex:0 0 30%;
            background:linear-gradient(135deg,#0a1f44,#1e3c72);
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            padding:60px;
        }

        .left-panel h1{
            font-size:30px;
            margin-bottom:20px;
            font-weight:600;
        }

        .left-panel p{
            font-size:15px;
            line-height:1.7;
            opacity:0.85;
        }

        .right-panel{
            flex:0 0 70%;
            padding:70px 90px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .right-panel h2{
            font-size:28px;
            margin-bottom:10px;
            color:#0a1f44;
        }

        .worktype-grid{
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:35px;
        }

        .worktype-card{
            background:white;
            border-radius:18px;
            padding:35px 25px;
            border:1px solid #e6eaf2;
            box-shadow:0 8px 25px rgba(0,0,0,0.05);
            transition:all 0.3s ease;
            cursor:pointer;
            text-align:left;
            width:100%;
        }

        .worktype-card:hover{
            transform:translateY(-6px);
            box-shadow:0 18px 40px rgba(0,0,0,0.12);
            border-color:#1e90ff;
        }

        .worktype-card h3{
            font-size:18px;
            margin-bottom:10px;
            color:#0a1f44;
            font-weight:600;
        }

        .worktype-card p{
            font-size:14px;
            color:#555;
            line-height:1.6;
        }

        form{
            all:unset;
        }

        @media(max-width:1000px){
            body{
                flex-direction:column;
            }
            .left-panel{
                height:35vh;
            }
            .right-panel{
                padding:40px;
            }
            .worktype-grid{
                grid-template-columns:1fr;
            }
        }

    </style>
</head>

<body>

<div class="left-panel">
    <h1>Select Work Type</h1>
    <p>
        Choose the employment type for generating the offer letter.
        Each work type includes customized terms, structure,
        and professional formatting.
    </p>
</div>

<div class="right-panel">
    <h2>Work Type</h2>

    <div class="worktype-grid">

        <form method="POST">
            <input type="hidden" name="worktype" value="Full Time">
            <button type="submit" class="worktype-card">
                <h3>Full Time</h3>
                <p>Permanent employment with full benefits and structured compensation.</p>
            </button>
        </form>

        <form method="POST">
            <input type="hidden" name="worktype" value="Part Time">
            <button type="submit" class="worktype-card">
                <h3>Part Time</h3>
                <p>Flexible working hours with defined responsibilities and benefits.</p>
            </button>
        </form>

        <form method="POST">
            <input type="hidden" name="worktype" value="Internship">
            <button type="submit" class="worktype-card">
                <h3>Internship</h3>
                <p>Structured training program with mentorship and skill development.</p>
            </button>
        </form>

    </div>
</div>

</body>
</html>
